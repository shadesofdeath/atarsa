<html lang="tr">

<meta charset="UTF-8" />

<title>Atarsa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --bg:#090c08; --bg2:#0f140c; --card:#141a10; --card2:#11160d;
  --line:#27331c; --line2:#1c2615;
  --gold:#c9a93f; --gold-b:#ecd79a; --gold-d:#9a8230;
  --green:#54683a; --text:#f0f3ea; --muted:#8d9a7f; --good:#86d27e; --bad:#e2796f;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;min-width:0}
html,body{margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;

  -webkit-text-size-adjust:100%}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}
.screen{flex:1;padding:18px 16px 112px;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.up{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.16em}
.num{font-family:'Oswald',sans-serif;font-variant-numeric:tabular-nums}

.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px}
.who{display:flex;align-items:center;gap:11px;min-width:0}
.avatar{position:relative;width:46px;height:46px;border-radius:13px;background:linear-gradient(160deg,#2a371b,#19200f);

.avatar svg{width:22px;height:22px;color:var(--gold-b)}
.dot{position:absolute;right:-2px;top:-2px;width:12px;height:12px;border-radius:50%;background:var(--good);border:2px solid var(--bg)}
.who .lbl{font-size:10px;color:var(--gold);letter-spacing:.2em}
.who .nm{font-size:17px;font-weight:600;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iconbtn{width:42px;height:42px;border-radius:12px;background:var(--card);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;color:var(--gold-b);cursor:pointer;flex:none}
.iconbtn svg{width:19px;height:19px}

.ringwrap{position:relative;width:min(264px,74vw);height:min(264px,74vw);margin:6px auto 4px}
.ringwrap svg{width:100%;height:100%;display:block}
.ringcenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringcenter .top{font-size:clamp(10px,3vw,12px);color:var(--gold);letter-spacing:.34em;margin-bottom:2px}
.ringcenter .big{font-family:'Oswald',sans-serif;font-size:clamp(56px,18vw,86px);line-height:.9;font-weight:600}
.pill{margin-top:8px;font-size:clamp(10px,2.6vw,11px);color:var(--muted);border:1px solid var(--line);border-radius:999px;
  padding:5px 14px;letter-spacing:.2em}
.pctline{text-align:center;color:var(--gold-d);font-size:12px;letter-spacing:.04em;margin:2px 0 0}

.hms-card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);

.hms-card .cap{text-align:center;font-size:clamp(9px,2.4vw,10px);color:var(--gold);letter-spacing:.22em;margin-bottom:12px}
.hms{display:flex;align-items:flex-start;justify-content:center;gap:4px}
.hms .seg{display:flex;flex-direction:column;align-items:center;flex:1;max-width:96px}
.hms .v{font-family:'Oswald',sans-serif;font-size:clamp(30px,10vw,44px);font-weight:600;line-height:1}
.hms .seg:last-child .v{color:var(--muted)}
.hms .k{font-size:9px;color:var(--muted);letter-spacing:.18em;margin-top:5px}
.hms .colon{font-family:'Oswald',sans-serif;font-size:clamp(24px,7vw,32px);color:var(--gold-d);line-height:1;padding-top:2px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:12px}
.mini{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:16px;padding:14px;overflow:hidden}

.mini .sub{font-size:10px;color:var(--muted);letter-spacing:.14em;margin-top:11px}

.mini .small{font-size:clamp(17px,5.2vw,20px)}
.uline{height:3px;width:46px;background:linear-gradient(90deg,var(--gold),transparent);border-radius:2px;margin-top:7px}
.season{display:inline-flex;align-items:center;gap:5px;color:var(--gold-b);font-size:11px;font-style:italic;margin-top:7px}
.cezanote{font-size:10px;color:var(--gold-d);margin-top:5px}

.quote{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:12px}
.quote .h{color:var(--gold);font-size:10px;letter-spacing:.2em}
.quote p{margin:8px 0 0;font-size:15px;font-style:italic;line-height:1.5}

.sec-title{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.14em;font-size:20px;margin:4px 0 14px}
.card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:18px;padding:16px}
.field{margin-bottom:13px}
.field:last-child{margin-bottom:0}
label.lab{display:block;font-size:11px;color:var(--gold);letter-spacing:.1em;margin-bottom:6px}
input,select{width:100%;background:#0c1008;border:1px solid var(--line);border-radius:11px;color:var(--text);

.btn{width:100%;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;

.btn:disabled{opacity:.65;cursor:default}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
.btn.danger{background:transparent;border:1px solid #4a2a26;color:var(--bad)}

.btn.ghost .spinner,.btn.danger .spinner{border-color:rgba(255,255,255,.25);border-top-color:#fff}

.list{margin-top:6px;max-height:46vh;overflow:auto;border:1px solid var(--line);border-radius:14px}
.list .it{display:flex;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line2);font-size:14px}

.muted{color:var(--muted)}
.hint{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5}

.nav{position:fixed;left:0;right:0;bottom:0;z-index:20}
.nav-inner{max-width:480px;margin:0 auto;background:rgba(10,14,8,.92);backdrop-filter:blur(12px);

.auth{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:26px 22px;max-width:430px;margin:0 auto}
.brand{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.3em;font-size:clamp(28px,9vw,36px);text-align:center}

.tabsw{display:flex;background:#0c1008;border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:18px}

.msg{font-size:13px;margin-top:12px;text-align:center;line-height:1.5}
.msg.err{color:var(--bad)}.msg.ok{color:var(--good)}

#toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:50;display:flex;flex-direction:column;gap:8px;align-items:center;width:max-content;max-width:90vw}
.toast{background:#18200f;border:1px solid var(--line);color:var(--gold-b);padding:11px 18px;border-radius:12px;

@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.empty{text-align:center;color:var(--muted);padding:30px 10px}
.empty .b{font-family:'Oswald';font-size:18px;color:var(--text);margin-bottom:8px;letter-spacing:.1em}
@media(max-width:380px){.screen{padding:14px 12px 110px}.hms-card{padding:14px 6px}.mini{padding:12px}.card{padding:14px}}
</style>
</head>

async function loadProfile(){

    const{data,error}=await supabase.from('profiles').select('*').eq('id',session.user.id).maybeSingle()

async function saveProfile(){

function effEndDate(){const b=profile.bitisTarihi;if(!b)return null;const d=new Date(b+'T00:00:00');d.setDate(d.getDate()+(Number(profile.cezaGunu)||0));return d}
function fmtD(d){return d?`${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`:'--'}

function quoteOfDay(){if(!QUOTES.length)return'';const s=new Date(new Date().getFullYear(),0,0);const dy=Math.floor((Date.now()-s)/864e5);return QUOTES[dy%QUOTES.length]}

function compute(){
  const a=profile.katilisTarihi,b=profile.bitisTarihi
  if(!a||!b)return null
  const ceza=Number(profile.cezaGunu)||0
  const start=new Date(a+'T00:00:00').getTime()
  const end=new Date(b+'T00:00:00').getTime()+ceza*864e5
  const now=Date.now()
  const total=Math.max(end-start,1),rem=Math.max(end-now,0)
  const el=Math.min(Math.max(now-start,0),total)
  const pct=Math.min(100,Math.round(el/total*100))
  return{days:Math.floor(rem/864e5),h:Math.floor(rem%864e5/36e5),m:Math.floor(rem%36e5/6e4),s:Math.floor(rem%6e4/1e3),
    pct,gecen:Math.floor(el/864e5),toplam:Math.round(total/864e5),done:rem<=0}
}

function ring(pct){
  const cx=132,cy=132,R=104,tIn=112,tOut=122,N=72
  let ticks=''
  for(let i=0;i<N;i++){const ang=i/N*2*Math.PI-Math.PI/2;const on=i/N<=pct/100
    const x1=cx+tIn*Math.cos(ang),y1=cy+tIn*Math.sin(ang),x2=cx+tOut*Math.cos(ang),y2=cy+tOut*Math.sin(ang)
    ticks+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${on?'#c9a93f':'#2c3a1f'}" stroke-width="2.4" stroke-linecap="round"/>`}
  const C=2*Math.PI*R,dash=pct/100*C
  const ea=-Math.PI/2+pct/100*2*Math.PI,dx=cx+R*Math.cos(ea),dy=cy+R*Math.sin(ea)
  return`<svg viewBox="0 0 264 264">
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9a8230"/><stop offset="1" stop-color="#ecd79a"/></linearGradient></defs>
    <g id="ticks">${ticks}</g>
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#1c2615" stroke-width="9"/>
    <circle id="arc" cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="url(#g)" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${dash.toFixed(1)} ${(C-dash).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>
    <circle id="dot" cx="${dx.toFixed(1)}" cy="${dy.toFixed(1)}" r="6" fill="#ecd79a"/></svg>`
}

function topbar(){
  const nm=(profile.ad||profile.soyad)?`${profile.ad} ${profile.soyad}`.trim():(session?'Asker':'Demo Asker')
  return`<div class="topbar">
    <div class="who"><div class="avatar">${svg(ICON.user)}<span class="dot"></span></div>
      <div style="min-width:0"><div class="lbl up">PERSONEL</div><div class="nm">${attr(nm)}</div></div></div>
    <div style="display:flex;gap:9px"><div class="iconbtn">${svg(ICON.share)}</div><div class="iconbtn">${svg(ICON.grid)}</div></div></div>`
}

function merkez(){
  const c=compute()
  if(!c)return topbar()+`<div class="empty"><div class="b up">Sayaç hazır değil</div>
    <p class="muted">Katılış ve terhis tarihini girince geri sayım başlar.</p>
    <button class="btn" style="max-width:240px;margin:18px auto 0" onclick="window.__go('askerim')">Bilgileri Gir</button></div>`
  const ee=effEndDate(),ceza=Number(profile.cezaGunu)||0
  return topbar()+`
    <div class="ringwrap">${ring(c.pct)}
      <div class="ringcenter"><div class="top up">ŞAFAK</div>
        <div class="big num" id="big">${c.done?0:c.days}</div>
        <div class="pill up" id="pill">${c.done?'TERHİS OLDU 🎖️':'GÜN KALDI'}</div></div></div>
    <div class="pctline" id="pctline">%${c.pct} tamamlandı · ${c.gecen} gün geçti</div>
    <div class="hms-card"><div class="cap up">${c.done?'GÖREV TAMAMLANDI':'TERHİSE KALAN SÜRE'}</div>
      <div class="hms">
        <div class="seg"><div class="v num" id="hh">${pad(c.h)}</div><div class="k">SAAT</div></div><div class="colon">:</div>
        <div class="seg"><div class="v num" id="mm">${pad(c.m)}</div><div class="k">DAKİKA</div></div><div class="colon">:</div>
        <div class="seg"><div class="v num" id="ss">${pad(c.s)}</div><div class="k">SANİYE</div></div>
      </div></div>
    <div class="grid2">
      <div class="mini"><div class="h up">${svg(ICON.medal)} İLERLEME</div>
        <div class="sub up">GEÇEN GÜN</div><div class="val num" id="gecen">${c.gecen}</div><div class="uline"></div></div>
      <div class="mini"><div class="h up">${svg(ICON.cal)} HEDEF</div>
        <div class="sub up">TERHİS TARİHİ</div><div class="val num small">${fmtD(ee)}</div>
        <div class="season">🌿 ${seasonM(ee?ee.getMonth()+1:0)}</div>
        ${ceza>0?`<div class="cezanote">+${ceza} ceza günü dahil</div>`:''}</div>
    </div>
    ${quoteOfDay()?`<div class="quote"><div class="h up">GÜNÜN SÖZÜ</div><p>${attr(quoteOfDay())}</p></div>`:''}`
}

function kisla(){
  const c=compute(),ceza=Number(profile.cezaGunu)||0
  const sel=PROVINCES.find(p=>p.plaka===profile.ilPlaka)
  const stat=(k,v)=>`<div class="s"><div class="k up">${k}</div><div class="v">${v}</div></div>`
  const ozet=c?`<div class="card" style="margin-bottom:12px">
    <div class="summary">${stat('TOPLAM',c.toplam+' gün')}${stat('GEÇEN',c.gecen+' gün')}</div>
    <div class="summary" style="margin-top:11px">${stat('KALAN',c.days+' gün')}${stat('CEZA',ceza+' gün')}</div></div>`:''
  return`<div class="sec-title">Kışla</div>
    ${ozet}
    <div class="summary" style="margin-bottom:12px">
      ${stat('RÜTBE',profile.rutbe||'—')}${stat('EĞİTİM YERİ',attr(profile.egitimYeri||'—'))}</div>
    <div class="card">
      <label class="lab up">İL / PLAKA REHBERİ</label>
      <input class="search" id="ilsearch" placeholder="İl ara..." oninput="window.__filt(this.value)"/>
      <div class="list" id="illist">${ilRows(PROVINCES,sel)}</div></div>`
}
function ilRows(arr,sel){return arr.map(p=>`<div class="it${sel&&p.plaka===sel.plaka?' act':''}"><span>${p.il}</span><span class="pk">${pad(p.plaka)}</span></div>`).join('')}

function askerim(){
  const ro=['<option value="">Seç...</option>'].concat(RANKS.map(r=>`<option ${r===profile.rutbe?'selected':''}>${r}</option>`)).join('')
  const io=['<option value="0">Seç...</option>'].concat(PROVINCES.map(p=>`<option value="${p.plaka}" ${p.plaka===profile.ilPlaka?'selected':''}>${pad(p.plaka)} - ${p.il}</option>`)).join('')
  return`<div class="sec-title">Asker'im</div>
    <div class="card">
      <div class="row2">
        <div class="field"><label class="lab up">Adı</label><input id="ad" value="${attr(profile.ad)}"/></div>
        <div class="field"><label class="lab up">Soyadı</label><input id="soyad" value="${attr(profile.soyad)}"/></div></div>
      <div class="row2">
        <div class="field"><label class="lab up">Katılış Tarihi</label><input id="katilisTarihi" type="date" value="${attr(profile.katilisTarihi)}"/></div>
        <div class="field"><label class="lab up">Terhis Tarihi</label><input id="bitisTarihi" type="date" value="${attr(profile.bitisTarihi)}"/></div></div>
      <div class="row2">
        <div class="field"><label class="lab up">İzin Hakkı (gün)</label><input id="izinHakki" type="number" inputmode="numeric" value="${attr(profile.izinHakki)}"/></div>
        <div class="field"><label class="lab up">Ceza Günü</label><input id="cezaGunu" type="number" inputmode="numeric" value="${attr(profile.cezaGunu)}"/></div></div>
      <div class="field"><label class="lab up">Eğitim Yeri</label><input id="egitimYeri" value="${attr(profile.egitimYeri)}"/></div>
      <div class="row2">
        <div class="field"><label class="lab up">Rütbe</label><select id="rutbe">${ro}</select></div>
        <div class="field"><label class="lab up">İl</label><select id="ilPlaka">${io}</select></div></div>
      <button class="btn" id="saveBtn" onclick="window.__save()">Kaydet</button>
    </div>
    <p class="hint">Ceza günü, terhis tarihine eklenir; sayaç buna göre hesaplanır.</p>`
}

function profil(){
  const initial=((profile.ad||'A')[0]||'A').toUpperCase()
  const email=session?session.user.email:'Misafir (yerel mod)'
  return`<div class="sec-title">Profil</div>
    <div class="prof-head"><div class="av num">${initial}</div>
      <div style="min-width:0"><div style="font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${attr((profile.ad+' '+profile.soyad).trim()||'Asker')}</div>
      <div class="muted" style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${attr(email)}</div></div></div>
    <div class="card">
      <div class="summary">
        <div class="s"><div class="k up">DURUM</div><div class="v">${ready&&session?'Üye':'Yerel'}</div></div>
        <div class="s"><div class="k up">İZİN HAKKI</div><div class="v">${profile.izinHakki||0} gün</div></div></div>
      <p class="hint">Bilgilerini "Asker'im" sekmesinden düzenleyebilirsin. ${ready?'':'Supabase ayarlı değil; veriler bu cihazda saklanıyor.'}</p></div>
    ${session?`<button class="btn danger" style="margin-top:14px" id="outBtn" onclick="window.__logout()">Çıkış Yap</button>`:''}`
}

function nav(){
  const t=(id,ic,lab)=>`<button class="tab${tab===id?' active':''}" onclick="window.__go('${id}')">${svg(ic)}<span class="up">${lab}</span></button>`
  return`<div class="nav"><div class="nav-inner">
    ${t('merkez',ICON.home,'Merkez')}${t('kisla',ICON.shield,'Kışla')}${t('askerim',ICON.heart,"Asker'im")}${t('profil',ICON.user,'Profil')}</div></div>`
}

function renderShell(){
  if(timer){clearInterval(timer);timer=null}
  const body=tab==='merkez'?merkez():tab==='kisla'?kisla():tab==='askerim'?askerim():profil()
  root.innerHTML=`<div class="app"><div class="screen">${body}</div>${nav()}</div>`
  if(tab==='merkez'&&compute())startTick()
}
function startTick(){
  timer=setInterval(()=>{
    const c=compute();if(!c)return
    const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v}
    set('big',c.done?0:c.days);set('hh',pad(c.h));set('mm',pad(c.m));set('ss',pad(c.s));set('gecen',c.gecen)
    const pl=document.getElementById('pctline');if(pl)pl.textContent=`%${c.pct} tamamlandı · ${c.gecen} gün geçti`
    const pill=document.getElementById('pill');if(pill)pill.textContent=c.done?'TERHİS OLDU 🎖️':'GÜN KALDI'
    const R=104,C=2*Math.PI*R,dash=c.pct/100*C,cx=132,cy=132
    const arc=document.getElementById('arc');if(arc)arc.setAttribute('stroke-dasharray',`${dash.toFixed(1)} ${(C-dash).toFixed(1)}`)
    const ea=-Math.PI/2+c.pct/100*2*Math.PI,dot=document.getElementById('dot')
    if(dot){dot.setAttribute('cx',(cx+R*Math.cos(ea)).toFixed(1));dot.setAttribute('cy',(cy+R*Math.sin(ea)).toFixed(1))}
    const tk=document.getElementById('ticks');if(tk){const tmp=document.createElement('div');tmp.innerHTML=ring(c.pct);const ng=tmp.querySelector('#ticks');if(ng)tk.innerHTML=ng.innerHTML}
  },1000)
}

window.__go=t=>{tab=t;renderShell()}
window.__filt=q=>{q=q.toLocaleLowerCase('tr');const sel=PROVINCES.find(p=>p.plaka===profile.ilPlaka)
  const f=PROVINCES.filter(p=>p.il.toLocaleLowerCase('tr').includes(q));const l=document.getElementById('illist');if(l)l.innerHTML=ilRows(f,sel)}
window.__save=async()=>{
  const g=id=>document.getElementById(id)
  profile.ad=g('ad').value;profile.soyad=g('soyad').value
  profile.katilisTarihi=g('katilisTarihi').value;profile.bitisTarihi=g('bitisTarihi').value
  profile.izinHakki=Number(g('izinHakki').value)||0;profile.cezaGunu=Number(g('cezaGunu').value)||0
  profile.egitimYeri=g('egitimYeri').value;profile.rutbe=g('rutbe').value;profile.ilPlaka=Number(g('ilPlaka').value)||0
  const b=g('saveBtn');b.disabled=true;b.innerHTML='<span class="spinner"></span> Kaydediliyor...'
  try{const m=await saveProfile();toast(m+' ✓')}catch(e){toast('Hata: '+(e.message||'kaydedilemedi'),'err')}
  b.disabled=false;b.innerHTML='Kaydet'
}
window.__logout=async()=>{const b=document.getElementById('outBtn');if(b){b.disabled=true;b.innerHTML='<span class="spinner"></span> Çıkılıyor...'}
  if(supabase)await supabase.auth.signOut()}

function renderAuth(){
  let mode='login'
  function draw(msg,cls){
    root.innerHTML=`<div class="auth">
      <div class="brand">ATARSA</div>
      <div class="brand-sub">Asker ve Yaren'lerinin buluşma noktası</div>
      <div class="tabsw"><button id="mLogin" class="${mode==='login'?'on':''}">Giriş Yap</button><button id="mReg" class="${mode==='signup'?'on':''}">Kayıt Ol</button></div>
      <div class="card">
        <div class="field"><label class="lab up">E-posta</label><input id="email" type="email" inputmode="email" placeholder="ornek@mail.com"/></div>
        <div class="field"><label class="lab up">Şifre</label><input id="password" type="password" placeholder="••••••••"/></div>
        <button class="btn" id="go">${mode==='login'?'Giriş Yap':'Kayıt Ol'}</button>
        ${msg?`<div class="msg ${cls||''}">${msg}</div>`:''}</div></div>`
    document.getElementById('mLogin').onclick=()=>{mode='login';draw()}
    document.getElementById('mReg').onclick=()=>{mode='signup';draw()}
    document.getElementById('go').onclick=submit
    document.getElementById('password').onkeydown=e=>{if(e.key==='Enter')submit()}
  }
  async function submit(){
    const email=document.getElementById('email').value.trim()
    const password=document.getElementById('password').value
    const b=document.getElementById('go')
    if(!email||!password){draw('E-posta ve şifre gerekli.','err');return}
    b.disabled=true;b.innerHTML='<span class="spinner"></span> '+(mode==='login'?'Giriş yapılıyor...':'Kayıt olunuyor...')
    try{
      if(mode==='signup'){
        const{error}=await supabase.auth.signUp({email,password,options:{emailRedirectTo:SITE_URL}})
        if(error)throw error
        draw('Kayıt alındı. E-postanı doğrula, sonra giriş yap.','ok')
      }else{
        const{error}=await supabase.auth.signInWithPassword({email,password})
        if(error)throw error
      }
    }catch(e){draw(e.message||'Bir hata oluştu.','err')}
  }
  draw()
}

async function render(){
  if(ready&&!session){renderAuth();return}
  await loadProfile()
  renderShell()
}
if(ready){
  const{data}=await supabase.auth.getSession()
  session=data.session
  supabase.auth.onAuthStateChange(async(_e,s)=>{const had=!!session;session=s;tab='merkez';await render();if(s&&!had)toast('Hoş geldin 👋')})
}
await render()
</script>
</body>
</html>
